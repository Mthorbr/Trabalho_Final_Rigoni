<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - KickStream</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-input: #2a2a35;
            --accent-yellow: #ffeb3b;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --border-color: #333333;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid var(--border-color); }
        header h1 { margin: 0; font-size: 24px; }
        header h1 span { color: var(--accent-yellow); }
        .header-links { display: flex; gap: 20px; font-size: 14px; }
        .header-links a { color: var(--text-gray); text-decoration: none; }
        .header-links a:hover { color: var(--accent-yellow); }
        .content { max-width: 600px; margin: 40px auto; padding: 30px; background: #1e1e24; border-radius: 6px; }
        h2 { color: var(--accent-yellow); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-gray); }
        input, textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-yellow); }
        button { background: var(--accent-yellow); color: black; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <h1><span>KICKSTREAM</span> ⚽ 🎮</h1>
        <div class="header-links">
            <a href="index.html">Catálogo</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html" style="color: var(--accent-yellow);">Contato</a>
        </div>
    </header>
    <div class="content">
        <h2>Fale Conosco</h2>
        <form onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso ao suporte KickStream!');">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" required placeholder="Digite seu e-mail">
            </div>
            <div class="form-group">
                <label>Assunto</label>
                <select style="width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 4px;">
                    <option>Problemas técnicos na transmissão</option>
                    <option>Dúvidas sobre parcerias</option>
                    <option>Outros</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mensagem</label>
                <textarea rows="4" required placeholder="Descreva sua solicitação..."></textarea>
            </div>
            <button type="submit">Enviar Mensagem</button>
        </form>
    </div>
</body>
</html>
